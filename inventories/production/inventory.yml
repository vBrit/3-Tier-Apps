---
all:
  children:
    web:
      hosts:
        seg-web-01c:
          ansible_host: "{{ Common.BaseNetwork.IPv4 }}.{{ Common.SiteCode }}.11"
          ansible_python_interpreter: /usr/bin/python3
        seg-web-02c:
          ansible_host: "{{ Common.BaseNetwork.IPv4 }}.{{ Common.SiteCode }}.12"
          ansible_python_interpreter: /usr/bin/python3
        seg-web-03c:
          ansible_host: "{{ Common.BaseNetwork.IPv4 }}.{{ Common.SiteCode }}.13"
          ansible_python_interpreter: /usr/bin/python3
    db:
      hosts:
        seg-db-01c:
          ansible_host: "{{ Common.BaseNetwork.IPv4 }}.{{ Common.SiteCode + 2 }}.10"
          ansible_python_interpreter: /usr/bin/python3
    app:
      hosts:
        seg-app-01c:
          ansible_host: "{{ Common.BaseNetwork.IPv4 }}.{{ Common.SiteCode + 1 }}.10"
          ansible_python_interpreter: /usr/bin/python3
  vars:
    ansible_user: "root"
    ansible_password: "{{ Common.Password.VMs }}"
